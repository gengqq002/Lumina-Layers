name: Sync Fork and Build Docker

on:
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨 2 点检查更新
  workflow_dispatch:      # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.sync.outputs.has_changes }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        id: sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加原项目
          git remote add upstream https://github.com/MOVIBALE/Lumina-Layers
          git fetch upstream
          
          # 检查是否有更新
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          
          if [ "$LOCAL" != "$UPSTREAM" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git merge upstream/main --no-edit
            git push origin main
            echo "✅ 已同步更新"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "⏸️ 无需更新"
          fi

  build:
    needs: sync
    if: needs.sync.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lumina-layers:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lumina-layers:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
